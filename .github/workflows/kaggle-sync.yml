name: Sync to Kaggle

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '${{ secrets.KAGGLE_KEY }}' > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Debug credentials
        run: |
          echo "Username configurado:"
          cat ~/.kaggle/kaggle.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['username'])"
          echo "Testando autenticação:"
          kaggle datasets list --mine
          
      - name: Update Kaggle dataset (código do projeto)
        run: |
          kaggle datasets version -p . -m "Auto-sync from commit ${{ github.sha }}"

      - name: Push notebooks to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          for metadata in notebooks/*_metadata.json; do
            kaggle kernels push -p notebooks/ --kernel-metadata-path "$metadata"
          done
