name: Sync to Kaggle

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle API Token (NEW)
        run: |
          mkdir -p ~/.kaggle
          echo "${{ secrets.KAGGLE_KEY }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Test authentication
        run: |
          kaggle config view
          kaggle datasets list

      - name: Update Kaggle dataset
        run: |
          kaggle datasets version -p . -m "Auto-sync from commit ${{ github.sha }}"

      - name: Push notebooks to Kaggle
        run: |
          for metadata in notebooks/*_metadata.json; do
            kaggle kernels push -p notebooks/ --kernel-metadata-path "$metadata"
          done
